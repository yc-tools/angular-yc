name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_cli:
        description: 'Force publish @yc-tools/angular-yc'
        type: boolean
        default: false
      force_runtime:
        description: 'Force publish @yc-tools/angular-yc-runtime'
        type: boolean
        default: false

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  NODE_VERSION: 20

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm (trusted publishing requires >=11.5.1)
        run: npm install -g npm@latest

      - name: Detect per-package changes
        id: changes
        shell: bash
        run: |
          LATEST_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -z "$LATEST_TAG" ]; then
            BASE="$(git rev-list --max-parents=0 HEAD)"
          else
            BASE="$LATEST_TAG"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE" HEAD)"
          echo "Changed files since $BASE:"
          echo "$CHANGED_FILES"

          CLI_CHANGED=false
          RUNTIME_CHANGED=false
          if echo "$CHANGED_FILES" | grep -Eq '^packages/angular-yc/(src/|package\.json|tsconfig\.json)'; then
            CLI_CHANGED=true
          fi
          if echo "$CHANGED_FILES" | grep -Eq '^packages/angular-yc-runtime/(src/|package\.json|tsconfig\.json)'; then
            RUNTIME_CHANGED=true
          fi

          if [ "${{ github.event.inputs.force_cli }}" = "true" ]; then
            CLI_CHANGED=true
          fi
          if [ "${{ github.event.inputs.force_runtime }}" = "true" ]; then
            RUNTIME_CHANGED=true
          fi

          echo "cli_changed=$CLI_CHANGED" >> "$GITHUB_OUTPUT"
          echo "runtime_changed=$RUNTIME_CHANGED" >> "$GITHUB_OUTPUT"
          if [ "$CLI_CHANGED" = "true" ] || [ "$RUNTIME_CHANGED" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release for non-code changes
        if: steps.changes.outputs.should_release != 'true'
        run: echo "No releasable package changes detected. Skipping publish/release."

      - name: Install dependencies
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm build

      - name: Determine next version
        if: steps.changes.outputs.should_release == 'true'
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/angular-yc/package.json').version")"
          LATEST_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [ -n "$LATEST_TAG" ]; then
            BASE_VERSION="${LATEST_TAG#v}"
            if [[ ! "$BASE_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Unsupported release tag version: $LATEST_TAG"
              exit 1
            fi
            NEXT_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
          else
            NEXT_VERSION="$PACKAGE_VERSION"
          fi

          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Selected release version: $NEXT_VERSION"

      - name: Bump @yc-tools/angular-yc-runtime version
        if: steps.changes.outputs.should_release == 'true' && steps.changes.outputs.runtime_changed == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          pnpm --filter @yc-tools/angular-yc-runtime exec npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish @yc-tools/angular-yc-runtime
        if: steps.changes.outputs.should_release == 'true' && steps.changes.outputs.runtime_changed == 'true'
        continue-on-error: true
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PACKAGE_NAME="@yc-tools/angular-yc-runtime"
          if npm view "$PACKAGE_NAME@$VERSION" version --registry=https://registry.npmjs.org > /dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION already exists in npm, skipping publish"
          else
            # pnpm publish rewrites `workspace:^` protocol to concrete versions
            # so the published tarball is installable with plain `npm install`.
            pnpm --filter @yc-tools/angular-yc-runtime publish --access public --tag latest --no-git-checks --provenance
          fi

      - name: Bump @yc-tools/angular-yc version
        if: steps.changes.outputs.should_release == 'true' && steps.changes.outputs.cli_changed == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          pnpm --filter @yc-tools/angular-yc exec npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish @yc-tools/angular-yc
        if: steps.changes.outputs.should_release == 'true' && steps.changes.outputs.cli_changed == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PACKAGE_NAME="@yc-tools/angular-yc"
          if npm view "$PACKAGE_NAME@$VERSION" version --registry=https://registry.npmjs.org > /dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION already exists in npm, skipping publish"
          else
            # pnpm publish rewrites `workspace:^` protocol to concrete versions
            # so the published tarball is installable with plain `npm install`.
            pnpm --filter @yc-tools/angular-yc publish --access public --tag latest --no-git-checks --provenance
          fi

      - name: Create GitHub Release
        if: steps.changes.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
          else
            {
              echo "## Release $VERSION"
              echo
              echo "### Packages Published"
              if [ "${{ steps.changes.outputs.cli_changed }}" = "true" ]; then
                echo "- \`@yc-tools/angular-yc@${{ steps.version.outputs.version }}\`"
              fi
              if [ "${{ steps.changes.outputs.runtime_changed }}" = "true" ]; then
                echo "- \`@yc-tools/angular-yc-runtime@${{ steps.version.outputs.version }}\`"
              fi
            } > release-notes.md
            gh release create "$VERSION" \
              --title "Release $VERSION" \
              --notes-file release-notes.md
          fi
