ycLimitations:
  - limitation: 'API Gateway payload size'
    value: '10MB'
    impact: 'Large responses should move to Object Storage or streaming fallback'
  - limitation: 'Function execution time'
    value: '10 minutes max'
    impact: 'Long-running jobs should be async'
  - limitation: 'Function memory'
    value: '8GB max'
    impact: 'Tune memory for heavy SSR renders'
  - limitation: 'Cold start time'
    value: '100-500ms typical'
    impact: 'Use prepared instances for latency-sensitive routes'

runtimeNotes:
  - note: 'Angular SSR runs in Node.js Cloud Functions through Express adapter.'
  - note: 'Response cache uses Object Storage for body + YDB for metadata and TTL.'
