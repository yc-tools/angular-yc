# Angular-YC Compatibility Matrix
# Angular feature support across versions for Yandex Cloud deployment.

versions:
  - range: '>=18.0.0 <19.0.0'
    features:
      ssr:
        status: supported
      prerender:
        status: supported
      expressApiRoutes:
        status: supported
        notes: 'Express API routes are defined in server.ts'
      hydration:
        status: supported
      incrementalHydration:
        status: unsupported
      signals:
        status: supported
      linkedSignal:
        status: unsupported
      resourceApi:
        status: experimental
      zoneless:
        status: experimental
      standaloneDefault:
        status: partial
      ngOptimizedImage:
        status: supported
      responseCache:
        status: supported

  - range: '>=19.0.0 <20.0.0'
